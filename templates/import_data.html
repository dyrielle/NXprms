{% extends 'base.html' %}

{% block content %}
<div class="container dm-page">
    <header class="dm-header fade-up">
        <h2>Data Management</h2>
        <p>Import and export inventory or sales datasets in CSV format.</p>
    </header>

    <div class="grid two-col dm-grid">
        <section class="card fade-up dm-card">
            <h3>Inventory Import</h3>
            <form method="post" enctype="multipart/form-data" class="dm-form">
                <div class="form-group">
                    <label for="inventory_file">Inventory CSV</label>
                    <input type="file" id="inventory_file" name="inventory_file" accept=".csv" />
                </div>

                <div class="form-group">
                    <label for="inventory_path">Server File Path (optional)</label>
                    <input type="text" id="inventory_path" name="inventory_path" value="{{ default_inventory }}" placeholder="e.g., data/inventory.csv" />
                </div>

                <label class="dm-checkbox-row">
                    <input type="checkbox" name="overwrite_inventory" checked />
                    <span>Overwrite existing product quantities</span>
                </label>

                <div class="form-group">
                    <label for="inventory_max_rows">Row Limit (optional)</label>
                    <input type="number" id="inventory_max_rows" name="inventory_max_rows" value="5000" min="1" />
                </div>

                <button type="submit" name="import_type" value="inventory" class="dm-submit-btn">Import Inventory</button>
            </form>
        </section>

        <section class="card fade-up delay-1 dm-card">
            <h3>Sales Import</h3>
            <form method="post" enctype="multipart/form-data" class="dm-form">
                <div class="form-group">
                    <label for="sales_file">Sales CSV</label>
                    <input type="file" id="sales_file" name="sales_file" accept=".csv" />
                </div>

                <div class="form-group">
                    <label for="sales_path">Server File Path (optional)</label>
                    <input type="text" id="sales_path" name="sales_path" value="{{ default_sales }}" placeholder="e.g., data/sales.csv" />
                </div>

                <label class="dm-checkbox-row">
                    <input type="checkbox" name="reset_sales" checked />
                    <span>Clear existing sales before import</span>
                </label>

                <div class="form-group">
                    <label for="sales_max_rows">Row Limit (optional)</label>
                    <input type="number" id="sales_max_rows" name="sales_max_rows" value="10000" min="1" />
                </div>

                <button type="submit" name="import_type" value="sales" class="dm-submit-btn">Import Sales</button>
            </form>
        </section>
    </div>

    <section class="card fade-up delay-2 dm-export-card">
        <h3>Dataset Export</h3>
        <p>Download current records for backup, migration, or offline analysis.</p>
        <div class="dm-export-actions">
            <a href="{{ url_for('export_dataset_inventory') }}" class="dm-link-btn">Export Inventory CSV</a>
            <a href="{{ url_for('export_dataset_sales') }}" class="dm-link-btn">Export Sales CSV</a>
        </div>
    </section>
</div>
{% endblock %}
